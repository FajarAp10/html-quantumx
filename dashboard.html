<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuantumX Admin</title>

<!-- Google Fonts: Sora -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* CSS VARIABLES (DESIGN SYSTEM) */
:root {
  --bg-base: #0e0f11;
  --bg-surface: #141518;
  --bg-elevated: #1a1c20;
  --border: #242629;
  --border-active: #2e3036;
  --accent: #4f8ef7;
  --accent-dim: rgba(79, 142, 247, 0.12);
  --accent-hover: #6a9ff8;
  --text-primary: #e8eaed;
  --text-secondary: #8a8f9a;
  --text-muted: #4a4f5a;
  --danger: #ef4444;
  --danger-dim: rgba(239, 68, 68, 0.1);
  --danger-hover: #dc2626;
  
  --radius-lg: 16px;
  --radius-md: 10px;
  --radius-sm: 8px;
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

/* RESET */
* { margin: 0; padding: 0; box-sizing: border-box; font-family: "Sora", sans-serif; }
body { background: var(--bg-base); color: var(--text-primary); display: flex; min-height: 100vh; overflow-x: hidden; }

/* LAYOUT: SIDEBAR */
.sidebar {
  width: 260px;
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  padding: 24px 20px;
  display: flex;
  flex-direction: column;
  position: fixed;
  height: 100vh;
  z-index: 40;
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 18px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 40px;
  padding-left: 8px;
}

.brand-icon {
  width: 28px;
  height: 28px;
  background: var(--accent);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 14px;
}

.nav-menu {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.nav-item {
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: var(--transition);
}

.nav-item:hover {
  background: var(--bg-elevated);
  color: var(--text-primary);
}

.nav-item.active {
  background: var(--accent-dim);
  color: var(--accent);
  border: 1px solid rgba(79, 142, 247, 0.2);
}

/* LAYOUT: MAIN CONTENT */
.main-content {
  flex: 1;
  margin-left: 260px;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* TOPBAR */
.topbar {
  height: 72px;
  padding: 0 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border);
  background: rgba(14, 15, 17, 0.7);
  backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 30;
}

.topbar-left h1 { font-size: 18px; font-weight: 600; color: var(--text-primary); }
.topbar-left p { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

/* LOGOUT BUTTON */
.logout {
  background: transparent;
  padding: 8px 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 500;
  transition: var(--transition);
  display: flex;
  align-items: center;
  gap: 8px;
}
.logout::before { content: '🚪'; font-size: 14px; }
.logout:hover {
  background: var(--bg-elevated);
  color: var(--text-primary);
  border-color: var(--text-muted);
}

/* CONTAINER */
.container {
  padding: 40px;
  max-width: 1000px;
  width: 100%;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 32px;
  animation: fadeIn 0.4s ease forwards;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* CARDS */
.card {
  background: var(--bg-surface);
  padding: 32px;
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  box-shadow: 0 4px 24px rgba(0, 0, 0, 0.15);
  transition: var(--transition);
}

.card:hover {
  border-color: rgba(79, 142, 247, 0.3);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
}

.card-header {
  margin-bottom: 24px;
}

.card-header h2 {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: 8px;
}

.card-header p {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 4px;
}

/* FORM & INPUTS */
.form-group {
  margin-bottom: 20px;
}

.form-label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 8px;
}

input {
  width: 100%;
  padding: 14px 16px;
  border-radius: var(--radius-md);
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  color: var(--text-primary);
  font-size: 14px;
  transition: var(--transition);
}

input:focus {
  border-color: var(--accent);
  outline: none;
  box-shadow: 0 0 0 3px var(--accent-dim);
  background: var(--bg-surface);
}

input::placeholder { color: var(--text-muted); }

/* BUTTONS */
.btn {
  padding: 14px 24px;
  background: var(--accent);
  border: none;
  color: #fff;
  border-radius: var(--radius-md);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.btn:hover {
  background: var(--accent-hover);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(79, 142, 247, 0.25);
}

.btn:active { transform: scale(0.98); }

.btn-danger {
  background: var(--danger-dim);
  color: var(--danger);
  border: 1px solid rgba(239, 68, 68, 0.2);
}

.btn-danger:hover {
  background: var(--danger);
  color: #fff;
  box-shadow: 0 4px 12px rgba(239, 68, 68, 0.25);
}

/* TABLE MODERN */
.table-container {
  overflow-x: auto;
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
  background: var(--bg-elevated);
}

table {
  width: 100%;
  border-collapse: collapse;
  text-align: left;
}

th {
  background: var(--bg-surface);
  padding: 16px 20px;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-secondary);
  font-weight: 600;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

td {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  color: var(--text-primary);
  font-size: 14px;
}

tr { transition: var(--transition); }
tr:hover td { background: rgba(255, 255, 255, 0.02); }
tr:last-child td { border-bottom: none; }

/* Override Inline JS Style for Table Delete Button */
td button {
  background: var(--danger-dim) !important;
  color: var(--danger) !important;
  border: 1px solid rgba(239, 68, 68, 0.2) !important;
  padding: 8px 14px !important;
  border-radius: var(--radius-sm) !important;
  font-size: 12px !important;
  font-family: 'Sora', sans-serif !important;
  font-weight: 600 !important;
  transition: var(--transition) !important;
}

td button:hover {
  background: var(--danger) !important;
  color: #fff !important;
  transform: translateY(-1px) !important;
  box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2) !important;
}

/* POPUP (MODAL) */
.popup-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(10, 11, 14, 0.8);
  backdrop-filter: blur(8px);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999;
  opacity: 0;
  animation: fadeInModal 0.2s ease forwards;
}

.popup-box {
  background: var(--bg-surface);
  padding: 32px;
  width: 90%;
  max-width: 400px;
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  box-shadow: 0 24px 48px rgba(0, 0, 0, 0.4);
  text-align: center;
  transform: scale(0.95);
  animation: scaleUpModal 0.2s ease forwards;
}

@keyframes fadeInModal { to { opacity: 1; } }
@keyframes scaleUpModal { to { transform: scale(1); } }

.popup-box h3 { font-size: 18px; font-weight: 600; color: var(--text-primary); margin-bottom: 8px; }
.popup-box p { font-size: 14px; color: var(--text-secondary); margin-bottom: 24px; line-height: 1.5; }

.popup-btns {
  display: flex;
  gap: 12px;
}

.popup-btn {
  flex: 1;
  padding: 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-weight: 600;
  font-size: 14px;
  transition: var(--transition);
  font-family: inherit;
}

.popup-cancel {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-primary);
}
.popup-cancel:hover { background: var(--bg-elevated); }

.popup-delete {
  background: var(--danger);
  border: none;
  color: white;
}
.popup-delete:hover { background: var(--danger-hover); }

.popup-ok {
  background: var(--accent);
  border: none;
  color: white;
}
.popup-ok:hover { background: var(--accent-hover); }

/* RESPONSIVE */
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); transition: 0.3s; }
  .main-content { margin-left: 0; }
  .topbar { padding: 0 20px; }
  .container { padding: 20px; }
  /* Hamburger hint */
  .topbar-left h1::before { content: '☰ '; color: var(--text-muted); cursor: pointer; margin-right: 8px; }
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="brand">
    <div class="brand-icon">Q</div>
    QuantumX
  </div>
  <nav class="nav-menu">
    <div class="nav-item active">✦ Dashboard</div>
    <div class="nav-item">👥 Users</div>
    <div class="nav-item">⚙️ Settings</div>
  </nav>
</aside>

<!-- MAIN CONTENT -->
<main class="main-content">
  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-left">
      <h1>Admin Panel</h1>
      <p>Kelola user & sistem</p>
    </div>
    <button class="logout" onclick="logout()">Logout</button>
  </header>

  <div class="container">
    
    <!-- CARD: TAMBAH LIMIT -->
    <div class="card">
      <div class="card-header">
        <h2>⚡ Update Limit</h2>
        <p>Tambahkan atau perbarui kuota limit untuk user spesifik.</p>
      </div>
      
      <div class="form-group">
        <label class="form-label">User ID</label>
        <input id="userId" placeholder="contoh: user-xxxx" autocomplete="off">
      </div>
      
      <div class="form-group">
        <label class="form-label">Limit Baru</label>
        <input id="newLimit" type="number" placeholder="Masukkan jumlah limit" autocomplete="off">
      </div>
      
      <button class="btn" style="width: 100%;" onclick="updateLimit()">Simpan Perubahan</button>
    </div>

    <!-- CARD: DAFTAR USER -->
    <div class="card">
      <div class="card-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;">
        <div>
          <h2>👥 Manajemen User</h2>
          <p>Daftar seluruh pengguna yang terdaftar di sistem.</p>
        </div>
        <button class="btn btn-danger" onclick="deleteAllUsers()">Hapus Semua Data</button>
      </div>
      
      <div class="table-container">
        <table id="userTable">
          <tr>
            <th>User ID</th>
            <th>Limit</th>
            <th>Aksi</th>
          </tr>
          <!-- Data akan dimuat disini oleh JS -->
        </table>
      </div>
    </div>

  </div>
</main>

<!-- POPUP MODAL -->
<div id="popup" class="popup-backdrop">
  <div class="popup-box">
    <h3 id="popupTitle">Judul</h3>
    <p id="popupText">Isi pesan</p>
    <div class="popup-btns" id="popupBtns">
      <!-- Tombol akan disesuaikan JS -->
    </div>
  </div>
</div>

<!-- JAVASCRIPT -->
<script>
if(localStorage.getItem("admin")!=="true"){ window.location.href="admin.html"; }
const SERVER = "http://localhost:8080";

let deleteTargetUser = null;
let deleteAllFlag = false;

// Load user list
async function loadUsers(){
  const res = await fetch(`${SERVER}/api/users`);
  const data = await res.json();
  const table = document.getElementById("userTable");
  table.innerHTML = `<tr><th>User ID</th><th>Limit</th><th>Aksi</th></tr>`;
  for(const id in data){
    table.innerHTML += `<tr>
      <td>${id}</td>
      <td>${data[id]}</td>
      <td><button onclick="deleteUser('${id}')" style="background:#ff4d4d;border:none;padding:6px 12px;border-radius:6px;color:white;cursor:pointer;">Hapus</button></td>
    </tr>`;
  }
}

// Show popup
function showPopup(title,text,buttons){
  const popup=document.getElementById("popup");
  document.getElementById("popupTitle").textContent=title;
  document.getElementById("popupText").textContent=text;
  const btnContainer=document.getElementById("popupBtns");
  btnContainer.innerHTML="";
  buttons.forEach(b=>{
    const btn=document.createElement("button");
    btn.textContent=b.text;
    btn.className="popup-btn "+b.className;
    btn.onclick=b.onClick;
    btnContainer.appendChild(btn);
  });
  popup.style.display="flex";
}

// Close popup
function closePopup(){
  deleteTargetUser=null;
  deleteAllFlag=false;
  document.getElementById("popup").style.display="none";
}

// Tambah / update limit
function updateLimit(){
  const id=document.getElementById("userId").value.trim();
  const limit=document.getElementById("newLimit").value.trim();
  if(!id || !limit){
    showPopup("Peringatan","Isi User dan Limit dulu!",[
      {text:"OK",className:"popup-ok",onClick:()=>closePopup()}
    ]);
    return;
  }
  fetch(`${SERVER}/api/setlimit`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id,limit})
  }).then(()=>{
    showPopup("Berhasil","Limit disimpan!",[
      {text:"OK",className:"popup-ok",onClick:()=>{ closePopup(); loadUsers(); }}
    ]);
  });
}

// Hapus user
function deleteUser(userId){
  deleteTargetUser=userId;
  deleteAllFlag=false;
  showPopup("Hapus User?",`User ${userId} akan dihapus permanen`,[
    {text:"Batal",className:"popup-cancel",onClick:()=>closePopup()},
    {text:"Hapus",className:"popup-delete",onClick:async ()=>{
      await fetch(`${SERVER}/api/delete-user`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({id:deleteTargetUser})
      });
      closePopup();
      showPopup("Berhasil",`User ${deleteTargetUser} dihapus!`,[
        {text:"OK",className:"popup-ok",onClick:()=>{ closePopup(); loadUsers(); }}
      ]);
    }}
  ]);
}

// Hapus semua user
function deleteAllUsers(){
  deleteAllFlag=true;
  showPopup("Hapus Semua User?","Semua user akan dihapus permanen",[
    {text:"Batal",className:"popup-cancel",onClick:()=>closePopup()},
    {text:"Hapus",className:"popup-delete",onClick:async ()=>{
      const res=await fetch(`${SERVER}/api/users`);
      const data=await res.json();
      for(const id in data){
        await fetch(`${SERVER}/api/delete-user`,{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({id})
        });
      }
      closePopup();
      showPopup("Berhasil","Semua user dihapus!",[
        {text:"OK",className:"popup-ok",onClick:()=>{ closePopup(); loadUsers(); }}
      ]);
    }}
  ]);
}

// Logout
function logout(){
  localStorage.removeItem("admin");
  window.location.href="admin.html";
}

loadUsers();
</script>
</body>
</html>
